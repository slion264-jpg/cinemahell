<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매불쇼 시네마지옥</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #e50914;
    --accent2: #b81c24;
    --text: #e8e8e8;
    --text2: #aaa;
    --text3: #666;
    --gold: #f5c518;
    --tag-liner: #3b82f6;
    --tag-jeon: #22c55e;
    --tag-choi: #a855f7;
    --tag-almost: #f97316;
    --tag-wook: #ec4899;
    --tag-young: #14b8a6;
    --tag-guest: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', -apple-system, sans-serif; min-height: 100vh; }

  /* HEADER */
  .site-header {
    background: linear-gradient(180deg, #000 0%, rgba(0,0,0,0.9) 100%);
    border-bottom: 2px solid var(--accent);
    padding: 0 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; height: 56px;
  }
  .logo { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--text); }
  .header-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
  .bookmark-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text2);
    transition: all 0.2s;
  }
  .bookmark-toggle.active { background: #f5c51820; border-color: var(--gold); color: var(--gold); }
  .bookmark-toggle.active #headerRibbonPath { fill: var(--gold); stroke: var(--gold); }
  .bookmark-count {
    background: var(--gold); color: #000;
    border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700;
  }

  /* 로그인 버튼 */
  .login-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text2);
    transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .login-btn:hover { border-color: #4285F4; color: var(--text); }
  .google-icon { width: 15px; height: 15px; flex-shrink: 0; }

  /* 유저 정보 */
  .user-info { display: none; align-items: center; gap: 8px; position: relative; }
  .user-avatar-wrap { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text2); white-space: nowrap; }
  .user-menu {
    display: none; position: absolute; top: 40px; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; min-width: 110px;
  }
  .user-menu.open { display: block; }
  .logout-btn {
    width: 100%; padding: 8px 12px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    font-size: 13px; color: var(--text2); text-align: left; transition: background 0.15s;
  }
  .logout-btn:hover { background: var(--surface2); color: var(--text); }

  /* FILTERS */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto;
    gap: 0 24px;
    align-items: start;
  }
  /* 항상 노출되는 상단 행: 검색 + 필터토글 */
  .filter-top-row {
    display: flex; align-items: center; gap: 10px;
    grid-column: 1 / -1; /* 모바일에서만 사용, PC에서는 숨김 */
  }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 7px 14px;
  }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 13px; width: 200px;
  }
  .search-box input::placeholder { color: var(--text3); }
  .search-icon { color: var(--text3); font-size: 14px; flex-shrink: 0; }

  /* 필터 토글 버튼 (모바일에서만 표시) */
  .filter-toggle-btn {
    display: none;
    align-items: center; gap: 6px; white-space: nowrap;
    padding: 7px 14px; border-radius: 20px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text2);
    transition: all 0.2s; flex-shrink: 0;
  }
  .filter-toggle-btn.active { border-color: var(--accent); color: var(--accent); }
  .filter-active-badge {
    background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 700;
  }

  /* PC: 필터 드로어 = 왼쪽 컬럼 */
  .filter-drawer {
    display: flex; flex-direction: column; gap: 8px;
    grid-column: 1;
    grid-row: 1;
  }
  /* PC: 검색+기타 = 오른쪽 컬럼 */
  .filter-side {
    grid-column: 2;
    grid-row: 1;
    display: flex; flex-direction: column; gap: 10px;
    align-items: flex-end;
    padding-top: 2px;
  }
  .filter-row {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; min-width: 36px; }
  .filter-btn {
    padding: 5px 11px; border-radius: 16px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text2);
    transition: all 0.18s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-divider { display: none; } /* PC에선 row 구조라 divider 불필요 */

  /* STATS BAR */
  .stats-bar {
    padding: 10px 24px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .stats-count { font-weight: 700; color: var(--text); }
  .sort-group { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sort-select {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 5px 10px;
    border-radius: 6px; cursor: pointer;
  }

  /* GRID */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 24px;
  }

  /* CARD */
  .movie-card {
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
  }
  .movie-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    border-color: #555;
  }
  .movie-card.bookmarked { border-color: var(--gold); }

  .poster-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--surface2);
  }
  .poster-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
  .movie-card:hover .poster-img { transform: scale(1.04); }
  .poster-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--text3);
    background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
    padding: 16px; text-align: center;
  }
  .poster-placeholder .ph-icon { font-size: 36px; opacity: 0.3; }
  .poster-placeholder .ph-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: var(--text2); }

  .bookmark-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s; z-index: 2;
    padding: 0;
  }
  .bookmark-btn:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }
  .bookmark-btn.active .ribbon-icon path { fill: var(--gold); stroke: var(--gold); }
  .bookmark-btn svg { width: 14px; height: 14px; }
  .ribbon-icon path { fill: none; stroke: #fff; stroke-width: 2; transition: all 0.2s; }

  /* 내가 본 영화 버튼 (좌상단) */
  .watched-btn {
    min-width: 28px; height: 28px; border-radius: 6px;
    padding: 0 5px;
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
    transition: all 0.2s; z-index: 3;
    position: relative;
  }
  .watched-btn:hover { background: rgba(0,0,0,0.9); }
  .watched-btn.rated { color: var(--gold); border-color: rgba(245,197,24,0.5); }

  /* 별점 입력 패널 */
  .star-panel {
    position: absolute; top: 0; left: 32px;
    background: rgba(0,0,0,0.92); border: 1px solid #444;
    border-radius: 8px; padding: 6px 8px;
    display: none; align-items: center; gap: 1px;
    z-index: 10; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }
  .star-panel.open { display: flex; }
  .star-wrap {
    position: relative; width: 28px; height: 28px;
    cursor: pointer; flex-shrink: 0;
  }
  .star-wrap svg { width: 28px; height: 28px; display: block; }
  .star-half-l, .star-half-r {
    position: absolute; top: 0; height: 100%; width: 50%; cursor: pointer;
  }
  .star-half-l { left: 0; }
  .star-half-r { right: 0; }

  .rating-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 700; color: var(--gold);
    white-space: nowrap;
  }

  /* 내가 본 영화 별점 표기 (카드 메타행) */
  .my-rating-display {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 11px; font-weight: 700; color: var(--gold);
    white-space: nowrap;
  }

  .card-body { padding: 8px 10px 8px; }
  .recommender-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
  }
  .tag-라이너 { background: #3b82f620; color: #60a5fa; border: 1px solid #3b82f640; }
  .tag-전찬일 { background: #22c55e20; color: #4ade80; border: 1px solid #22c55e40; }
  .tag-최광희 { background: #a855f720; color: #c084fc; border: 1px solid #a855f740; }
  .tag-거의없다 { background: #f9731620; color: #fb923c; border: 1px solid #f9731640; }
  .tag-최욱 { background: #ec489920; color: #f472b6; border: 1px solid #ec489940; }
  .tag-정영진 { background: #14b8a620; color: #2dd4bf; border: 1px solid #14b8a640; }
  .tag-게스트 { background: #8b5cf620; color: #a78bfa; border: 1px solid #8b5cf640; }

  .card-title {
    font-size: 13px; font-weight: 700; color: var(--text);
    line-height: 1.3; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative;
  }
  /* subtitle: 시즌, 에피소드 등 부가정보 */
  .card-subtitle {
    font-size: 11px; font-weight: 500;
    color: var(--text2); margin-left: 4px;
  }
  /* 말줄임된 경우에만 hover → 왼쪽으로 흘러가는 marquee 효과 */
  .card-title.is-truncated:hover {
    overflow: visible;
  }
  .card-title.is-truncated:hover > span {
    display: inline-block;
    animation: marquee-title 1s linear forwards;
  }
  @keyframes marquee-title {
    0%   { transform: translateX(0); }
    100% { transform: translateX(var(--marquee-dist, -60%)); }
  }
  .card-genres {
    display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .genre-tag {
    padding: 1px 5px; border-radius: 4px; font-size: 10px;
    background: var(--surface2); color: var(--text3); border: 1px solid var(--border);
  }
  .platform-row {
    display: flex; gap: 4px; flex-wrap: wrap; min-height: 20px; align-items: center;
  }
  .platform-badge {
    padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600;
    cursor: pointer; text-decoration: none;
  }
  .plt-netflix { background: #e5091420; color: #e50914; border: 1px solid #e5091440; }
  .plt-wavve { background: #1c73e820; color: #4da3ff; border: 1px solid #1c73e840; }
  .plt-watcha { background: #ff285020; color: #ff6080; border: 1px solid #ff285040; }
  .plt-disney { background: #0f3fa620; color: #5599ff; border: 1px solid #0f3fa640; }
  .plt-coupang { background: #c0392b20; color: #ff6b6b; border: 1px solid #c0392b40; }
  .plt-apple { background: #55555520; color: #aaa; border: 1px solid #55555540; }
  .plt-naver { background: #03c75a20; color: #03c75a; border: 1px solid #03c75a40; }
  .plt-default { background: #33333320; color: #888; border: 1px solid #33333340; }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 24px; color: var(--text3); gap: 12px; text-align: center;
  }
  .empty-state .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-state .empty-title { font-size: 18px; font-weight: 700; color: var(--text2); }

  /* LOADING */
  .loading-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: var(--accent); transition: width 0.3s;
    z-index: 9999;
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px; border: 1px solid var(--border);
    max-width: 540px; width: 100%;
    display: flex; gap: 0; overflow: hidden;
    max-height: 90vh;
  }
  .modal-poster {
    width: 180px; flex-shrink: 0;
    background: var(--surface2);
  }
  .modal-poster img { width: 100%; height: 100%; object-fit: cover; }
  .modal-content { padding: 24px; overflow-y: auto; flex: 1; }
  .modal-recommender { margin-bottom: 8px; }
  .modal-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; line-height: 1.2; }
  .modal-year { font-size: 14px; color: var(--text3); margin-bottom: 12px; }
  .modal-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  .modal-rating .stars { color: var(--gold); font-size: 18px; }
  .modal-rating .score { font-size: 20px; font-weight: 900; color: var(--gold); }
  .modal-rating .votes { font-size: 12px; color: var(--text3); }
  .modal-genres { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .modal-genre { padding: 4px 10px; border-radius: 16px; font-size: 12px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .modal-overview { font-size: 13px; line-height: 1.6; color: var(--text2); margin-bottom: 16px; }
  .modal-platforms { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .modal-platform-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; color: var(--text2);
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--accent); color: #fff; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* RESPONSIVE */
  /* PC 전용: filter-side 오늘 볼 영화 버튼 */
  .picker-btn-pc {
    width: 120px; height: 110px;
    padding: 12px 8px 14px;
    border-radius: 14px;
    border: 1px solid #c0392b;
    background: linear-gradient(160deg, #1a0a0a 0%, #2d0a0a 50%, #1a0000 100%);
    color: #fff;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(229,9,20,0.3), inset 0 1px 0 rgba(255,100,100,0.15);
    transition: all 0.22s;
    position: relative; overflow: hidden;
  }
  .picker-btn-pc::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(229,9,20,0.18) 0%, transparent 60%);
    border-radius: 14px;
  }
  .picker-btn-pc:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 28px rgba(229,9,20,0.55), inset 0 1px 0 rgba(255,120,120,0.25);
    transform: translateY(-2px);
  }
  .picker-btn-pc:active { transform: translateY(0); }
  .picker-btn-pc .pc-icon {
    font-size: 44px; line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(229,9,20,0.6));
  }
  .picker-btn-pc .pc-label {
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.3px; color: #fff;
    text-shadow: 0 1px 6px rgba(229,9,20,0.8);
    white-space: nowrap;
  }

  /* PC에서 stats-bar 뽑기 버튼 숨김 */
  @media (min-width: 641px) {
    .picker-btn-mobile { display: none !important; }
    .picker-btn-pc { display: flex; }
    .filter-top-row { display: none; }
  }
  /* 모바일에서 filter-side 뽑기 버튼 숨김 */
  @media (max-width: 640px) {
    .picker-btn-pc { display: none !important; }
    .picker-btn-mobile { display: flex !important; }
  }

  @media (max-width: 640px) {
    /* 오버레이 항상 표시 (모바일) */
    .card-overlay { opacity: 1; pointer-events: auto; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); }

    /* 별점 패널: 별 사이즈 축소 + 카드 안에 맞게 위치 조정 */
    .star-wrap { width: 20px; height: 20px; }
    .star-wrap svg { width: 20px; height: 20px; }
    .star-panel { left: 0; top: 32px; padding: 5px 6px; gap: 0; }

    /* 헤더 */
    .site-header { padding: 0 16px; height: 52px; }
    .logo { font-size: 18px; }
    .bookmark-toggle { padding: 6px 10px; font-size: 12px; gap: 5px; }
    /* 모바일: 로그인은 구글 아이콘만, 유저명 숨김 */
    .login-btn { padding: 6px 8px; gap: 0; }
    .login-label { display: none; }
    .user-name { display: none; }
    .user-menu { top: 36px; }

    /* 필터 바 */
    .filter-bar { padding: 10px 14px; gap: 8px; display: flex; flex-direction: column; }
    .filter-top-row { display: flex; }
    .filter-side { display: none; }
    .filter-toggle-btn { display: flex; }
    .filter-drawer { display: none; }
    .filter-drawer.open { display: flex; }
    .filter-label { font-size: 10px; min-width: 32px; }
    .filter-btn { padding: 5px 9px; font-size: 11px; }

    /* stats bar */
    .stats-bar { padding: 8px 14px; gap: 8px; font-size: 12px; flex-wrap: wrap; }
    .sort-group { margin-left: 0; width: 100%; justify-content: flex-end; gap: 6px; }
    .sort-group button { font-size: 12px; padding: 5px 10px; }
    .sort-select { font-size: 12px; padding: 5px 8px; }

    /* 그리드 */
    .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; }

    /* 모달 */
    .modal { flex-direction: column; max-height: 85vh; }
    .modal-poster { width: 100%; height: 220px; }
    .modal-poster img { object-position: center 20%; }
    .modal-content { padding: 16px; }

<!-- Firebase 동적 로드 (CDN 실패 시 대체 CDN 자동 사용) -->
<script>
(function() {
  const CDNS = [
    'https://www.gstatic.com/firebasejs/8.10.1/',
    'https://cdn.jsdelivr.net/npm/firebase@8.10.1/',
    'https://unpkg.com/firebase@8.10.1/'
  ];
  const SCRIPTS = ['firebase-app.js', 'firebase-auth.js', 'firebase-firestore.js'];
  const CFG = {
    apiKey: "AIzaSyDFrWQulW_QMuHhj3NSfE-V4aPhqrspNV0",
    authDomain: "cinemahell-a3f39.firebaseapp.com",
    projectId: "cinemahell-a3f39",
    storageBucket: "cinemahell-a3f39.firebasestorage.app",
    messagingSenderId: "363678066624",
    appId: "1:363678066624:web:e9830ff7658082e1ac0a25"
  };

  function loadScript(src) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload  = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  async function loadFromCDN(base) {
    for (const file of SCRIPTS) {
      await loadScript(base + file);
    }
  }

  async function tryAllCDNs() {
    for (const base of CDNS) {
      try {
        console.log('[FB] trying CDN:', base);
        await loadFromCDN(base);
        if (typeof firebase !== 'undefined') {
          console.log('[FB] CDN loaded OK:', base);
          return true;
        }
      } catch(e) {
        console.warn('[FB] CDN failed:', base, e);
        // 이전에 로드된 스크립트로 인해 firebase 중복 초기화 방지
      }
    }
    return false;
  }

  tryAllCDNs().then(ok => {
    if (!ok || typeof firebase === 'undefined') {
      console.error('[FB] 모든 CDN 로드 실패');
      document.getElementById('loginBtn') &&
        (document.getElementById('loginBtn').title = 'Firebase 로드 실패 - 네트워크 확인');
      return;
    }

    // ── 초기화
    if (!firebase.apps.length) firebase.initializeApp(CFG);
    const _auth = firebase.auth();
    const _db   = firebase.firestore();
    console.log('[FB] Firebase initialized');

    // ── 전역 함수 등록
    window.fbLogin = function() {
      console.log('[FB] fbLogin called');
      const provider = new firebase.auth.GoogleAuthProvider();
      _auth.signInWithPopup(provider)
        .then(r => console.log('[FB] login ok:', r.user.email))
        .catch(e => console.error('[FB] login error:', e.code, e.message));
    };
    window.fbLogout = function() {
      _auth.signOut().then(() => {
        console.log('[FB] logout ok');
        // 로그아웃 시 로컬 개인화 데이터 초기화
        state.bookmarks = new Set();
        state.myRatings = {};
        localStorage.removeItem('cinemaBookmarks');
        localStorage.removeItem('cinemaMyRatings');
        document.getElementById('bookmarkCount').textContent = '0';
        renderGrid();
      });
    };
    window.toggleUserMenu = function() {
      document.getElementById('userMenu')?.classList.toggle('open');
    };

    // ── 인증 상태 감지
    let _prevUid = null;
    _auth.onAuthStateChanged(async user => {
      console.log('[FB] authState:', user ? user.email : 'signed out');
      const loginBtn = document.getElementById('loginBtn');
      const userInfo = document.getElementById('userInfo');

      // 계정이 바뀌었거나 로그아웃된 경우 → 로컬 데이터 초기화
      if (_prevUid && _prevUid !== (user?.uid || null)) {
        state.bookmarks = new Set();
        state.myRatings = {};
        localStorage.removeItem('cinemaBookmarks');
        localStorage.removeItem('cinemaMyRatings');
        document.getElementById('bookmarkCount').textContent = '0';
      }
      _prevUid = user?.uid || null;
      window._fbUser = user || null;

      if (user) {
        if (loginBtn) loginBtn.style.display = 'none';
        if (userInfo) userInfo.style.display = 'flex';
        const avatar = document.getElementById('userAvatar');
        const name   = document.getElementById('userName');
        if (avatar) avatar.src = user.photoURL || '';
        if (name)   name.textContent = (user.displayName || '유저').split(' ')[0];
        // 새 계정 클라우드 데이터 로드
        await window._syncFromCloud?.(user.uid);
      } else {
        if (loginBtn) loginBtn.style.display = 'flex';
        if (userInfo) userInfo.style.display = 'none';
      }
      await window._loadCommunityStats?.();
      if (typeof renderGrid === 'function') renderGrid();
    });

    // ── 외부 클릭 시 유저 메뉴 닫기
    document.addEventListener('click', e => {
      if (!e.target.closest('#userAvatarWrap') && !e.target.closest('#userMenu')) {
        document.getElementById('userMenu')?.classList.remove('open');
      }
    });

    // ── Firestore 헬퍼
    window._db   = _db;
    window._auth = _auth;

  }).catch(e => console.error('[FB] init error:', e));
})();
</script>

const TMDB_KEY = 'eeb851ae2777074ea0c4d84f1e21aa12'; // TMDB Read Access Token

let state = {
  filters: { recommender: '전체', year: '전체', genre: '전체', platform: '전체' },
  search: '',
  bookmarks: new Set(JSON.parse(localStorage.getItem('cinemaBookmarks') || '[]')),
  showBookmarksOnly: false,
  movieCache: {},
  loadedCount: 0,
  loadingSet: new Set(),
  myRatings: JSON.parse(localStorage.getItem('cinemaMyRatings') || '{}'), // key → 0.5~5
  excludeWatched: false,
  showWatchedOnly: false,
};

// ============================================================
// 영화 데이터 처리
// ============================================================
function parseTitle(raw) {
  // 게스트명 분리: "제목 (연도) - 게스트명" 또는 "제목 - 게스트명"
  let guestName = null;
  let titleOnly = raw;
  const guestMatch = raw.match(/^(.+?)\s+-\s+([^-]+)$/);
  if (guestMatch) {
    titleOnly = guestMatch[1].trim();
    guestName = guestMatch[2].trim();
  }
  const m = titleOnly.match(/^(.+?)\s*\((\d{4})\)$/);
  return m
    ? { cleanTitle: m[1].trim(), releaseYear: m[2], guestName }
    : { cleanTitle: titleOnly.trim(), releaseYear: null, guestName };
}

function getMovieKey(m) {
  return `${m.title}__${m.recommender}__${m.year}__${m.date}`;
}

// 추천자 정렬 우선순위
const RECOMMENDER_ORDER = ['라이너','전찬일','최광희','거의없다','최욱','정영진','게스트'];

function parseDate(m) {
  // "MM.DD" → Date 객체 (점이 두 개여도 안전하게 split으로 처리)
  const parts = m.date.split('.');
  const month = (parts[0] || '01').padStart(2,'0');
  const day   = (parts[1] || '01').padStart(2,'0');
  return new Date(`${m.year}-${month}-${day}`);
}

function sortMovies(list) {
  const sel = document.getElementById('sortSelect').value;
  return [...list].sort((a, b) => {
    if (sel === 'rating') {
      const ra = state.movieCache[getMovieKey(a)]?.rating || 0;
      const rb = state.movieCache[getMovieKey(b)]?.rating || 0;
      if (rb !== ra) return rb - ra;
    }
    const da = parseDate(a);
    const db = parseDate(b);
    if (sel === 'oldest') {
      if (da - db !== 0) return da - db;
    } else {
      if (db - da !== 0) return db - da;
    }
    // 같은 날짜: 추천자 우선순위 (목록에 없는 게스트는 맨 뒤)
    const ri = RECOMMENDER_ORDER.indexOf(a.recommender);
    const rj = RECOMMENDER_ORDER.indexOf(b.recommender);
    return (ri === -1 ? 99 : ri) - (rj === -1 ? 99 : rj);
  });
}

function filterMovies() {
  const { recommender, year, genre, platform } = state.filters;
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  return RAW_DATA.filter(m => {
    if (state.showBookmarksOnly && !state.bookmarks.has(getMovieKey(m))) return false;
    if (state.excludeWatched && state.myRatings[getMovieKey(m)]) return false;
    if (state.showWatchedOnly && !state.myRatings[getMovieKey(m)]) return false;
    if (recommender !== '전체' && m.recommender !== recommender) return false;
    if (year !== '전체' && m.year !== year) return false;
    // 검색어: 제목에서 게스트명 제외한 순수 제목으로 매칭
    if (q) {
      const { cleanTitle } = parseTitle(m.title);
      if (!cleanTitle.toLowerCase().includes(q) && !m.title.toLowerCase().includes(q)) return false;
    }
    const info = state.movieCache[getMovieKey(m)];
    // 장르 필터: TMDB 장르 데이터가 있고 정확히 포함된 것만
    if (genre !== '전체') {
      if (!info || !info.genres || info.genres.length === 0) return false;
      if (!info.genres.includes(genre)) return false;
    }
    // 플랫폼 필터: ottList에서 provider name으로 매칭
    if (platform !== '전체') {
      if (!info || !info.ottList || info.ottList.length === 0) return false;
      const PLATFORM_MAP = {
        'Netflix': ['Netflix'],
        'Wavve': ['Wavve'],
        'Watcha': ['Watcha'],
        'Disney+': ['Disney Plus', 'Disney+'],
        'Coupang': ['Coupang Play'],
      };
      const targets = PLATFORM_MAP[platform] || [platform];
      const hasMatch = info.ottList.some(p =>
        targets.some(t => p.name.toLowerCase().includes(t.toLowerCase()))
      );
      if (!hasMatch) return false;
    }
    return true;
  });
}

  'The 8 Show__2024': { id: 156484, type: 'tv' },  // The 8 Show (2024)
};

const genreMap = {28:'액션',12:'어드벤처',16:'애니메이션',35:'코미디',80:'범죄',99:'다큐멘터리',18:'드라마',10751:'가족',14:'판타지',36:'역사',27:'공포',10402:'음악',9648:'미스터리',10749:'로맨스',878:'SF',10770:'TV영화',53:'스릴러',10752:'전쟁',37:'서부'};

async function searchTMDB(title, year, mediaType = 'movie') {
  const q = encodeURIComponent(title);
  const yearParam = year ? (mediaType === 'tv' ? `&first_air_date_year=${year}` : `&year=${year}`) : '';
  const res = await fetch(`https://api.themoviedb.org/3/search/${mediaType}?api_key=${TMDB_KEY}&query=${q}${yearParam}&language=ko-KR&include_adult=false`);
  const data = await res.json();
  return data.results || [];
}

// multi 검색: 한국어 제목으로 movie/tv 모두 검색 (번역 제목 매칭 포함)
async function searchTMDBMulti(title, year) {
  const q = encodeURIComponent(title);
  const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${q}&language=ko-KR&include_adult=false`);
  const data = await res.json();
  const results = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv');
  if (!year) return results;
  // 연도 일치 우선 필터 (없으면 전체 반환)
  const matched = results.filter(r => {
    const d = r.release_date || r.first_air_date || '';
    return d.startsWith(year);
  });
  return matched.length > 0 ? matched : results;
}

async function getOttList(tmdbId, mediaType) {
  try {
    const endpoint = mediaType === 'tv'
      ? `https://api.themoviedb.org/3/tv/${tmdbId}/watch/providers?api_key=${TMDB_KEY}`
      : `https://api.themoviedb.org/3/movie/${tmdbId}/watch/providers?api_key=${TMDB_KEY}`;
    const wpRes = await fetch(endpoint);
    const wpData = await wpRes.json();
    const kr = wpData.results?.KR || {};
    const allProviders = [
      ...(kr.flatrate || []),
      ...(kr.free || []),
      ...(kr.ads || []),
    ];
    const seen = new Set();
    return allProviders.filter(p => {
      if (seen.has(p.provider_id)) return false;
      seen.add(p.provider_id);
      return true;
    }).map(p => ({
      id: p.provider_id,
      name: p.provider_name,
      logo: `https://image.tmdb.org/t/p/original${p.logo_path}`,
    }));
  } catch(e) { return []; }
}

async function fetchTMDB(title, year) {
  const cacheKey = `${title}__${year}`;
  // TMDB_ID_MAP에 있는 항목은 null 캐시도 무시하고 재시도 (수동 매핑 우선)
  const isManualMapped = !!TMDB_ID_MAP[cacheKey];
  if (!isManualMapped && tmdbCache[cacheKey] !== undefined) return tmdbCache[cacheKey];
  if (isManualMapped && tmdbCache[cacheKey]) return tmdbCache[cacheKey];
  try {
    // 0차: 수동 매핑 테이블 우선 확인 (제목__연도 키)
    const mapKey = `${title}__${year}`;
    if (TMDB_ID_MAP[mapKey]) {
      const { id, type } = TMDB_ID_MAP[mapKey];
      const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&language=ko-KR`);
      const m = await res.json();
      const ottList = await getOttList(id, type);
      tmdbCache[cacheKey] = {
        poster: m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : null,
        rating: m.vote_average ? Math.round(m.vote_average * 10) / 10 : null,
        voteCount: m.vote_count,
        overview: m.overview,
        genres: (m.genres || []).map(g => g.name).filter(Boolean),
        tmdbId: id,
        mediaType: type,
        releaseDate: m.release_date || m.first_air_date,
        ottList,
      };
      return tmdbCache[cacheKey];
    }

    // 검색 시도 순서: movie(연도), movie(무연도), movie(특수문자제거), tv(연도), tv(무연도), tv(특수문자제거)
    // 쉼표(,)도 포함 → '전,란' → '전 란' 형태로 변환
    const simplTitle = title.replace(/[:\-–·,]/g, ' ').replace(/\s+/g,' ').trim();

    let results = [];
    let foundType = 'movie';

    // 1~3차: movie 검색
    results = await searchTMDB(title, year, 'movie');
    if (results.length === 0 && year) results = await searchTMDB(title, null, 'movie');
    if (results.length === 0 && simplTitle !== title) results = await searchTMDB(simplTitle, null, 'movie');

    // 4~6차: movie에서 못 찾으면 tv로 폴백
    if (results.length === 0) {
      foundType = 'tv';
      results = await searchTMDB(title, year, 'tv');
      if (results.length === 0 && year) results = await searchTMDB(title, null, 'tv');
      if (results.length === 0 && simplTitle !== title) results = await searchTMDB(simplTitle, null, 'tv');
    }

    // 7차: multi 검색 (번역 제목 등 한국어로 못 찾는 경우 폭넓게 재시도)
    if (results.length === 0) {
      const multiResults = await searchTMDBMulti(title, year);
      if (multiResults.length > 0) {
        foundType = multiResults[0].media_type || 'movie';
        results = multiResults;
      }
    }

    if (results.length > 0) {
      const m = results[0];
      const detectedType = m.media_type || foundType;
      const ottList = await getOttList(m.id, detectedType);

      // TV 시리즈는 title/release_date 필드명이 다름
      const dateField = detectedType === 'tv' ? m.first_air_date : m.release_date;

      tmdbCache[cacheKey] = {
        poster: m.poster_path ? `https://image.tmdb.org/t/p/w342${m.poster_path}` : null,
        rating: m.vote_average ? Math.round(m.vote_average * 10) / 10 : null,
        voteCount: m.vote_count,
        overview: m.overview,
        genres: (m.genre_ids || []).map(id => genreMap[id]).filter(Boolean),
        tmdbId: m.id,
        mediaType: detectedType,
        releaseDate: dateField,
        ottList: ottList,
      };
    } else {
      tmdbCache[cacheKey] = null;
    }
  } catch(e) {
    tmdbCache[cacheKey] = null;
  }
  return tmdbCache[cacheKey];
}

function renderGrid() {
  const filtered = sortMovies(filterMovies());
  const grid = document.getElementById('movieGrid');
  const totalEl = document.getElementById('totalCount');
  totalEl.textContent = filtered.length;

  // 필터 설명
  const parts = [];
  if (state.showBookmarksOnly) parts.push('🔖 책갈피');
  if (state.filters.recommender !== '전체') parts.push(state.filters.recommender);
  if (state.filters.year !== '전체') parts.push(state.filters.year + '년');
  if (state.filters.genre !== '전체') parts.push(state.filters.genre);
  if (state.filters.platform !== '전체') parts.push(state.filters.platform);
  if (state.search) parts.push(`"${state.search}"`);
  document.getElementById('filterDesc').textContent = parts.length ? parts.join(' · ') : '전체 목록';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-title">조건에 맞는 영화가 없습니다</div><div>필터를 변경해보세요</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(m => renderCard(m)).join('');

  // 말줄임 여부 체크 → 실제로 잘린 제목에만 is-truncated 클래스 부여
  requestAnimationFrame(() => {
    grid.querySelectorAll('.card-title').forEach(el => {
      if (el.scrollWidth > el.clientWidth) {
        el.classList.add('is-truncated');
        // 흘러가야 할 거리를 px 기준으로 계산해 CSS 변수로 전달
        const overflow = el.scrollWidth - el.clientWidth;
        el.style.setProperty('--marquee-dist', `-${overflow}px`);
      } else {
        el.classList.remove('is-truncated');
      }
    });
  });

  // 포스터 lazy-load (로딩 중 중복 호출 방지)
  filtered.forEach(m => {
    const key = getMovieKey(m);
    if (!state.movieCache[key] && !state.loadingSet.has(key)) {
      loadMovieInfo(m);
    }
  });
}

function renderCard(m) {
  const key = getMovieKey(m);
  const info = state.movieCache[key];
  const isBookmarked = state.bookmarks.has(key);
  const { cleanTitle, releaseYear, guestName } = parseTitle(m.title);
  const episodeYear = releaseYear || m.year;

  // posterOverride 필드가 있으면 TMDB 포스터 대신 사용
  const posterSrc = m.posterOverride || info?.poster;
  const poster = posterSrc
    ? `<img class="poster-img" src="${posterSrc}" alt="${cleanTitle}" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="poster-placeholder"><div class="ph-icon">🎬</div><div class="ph-title">${cleanTitle}</div></div>`;

  const ratingHtml = info?.rating
    ? `<span class="rating-badge">★ ${info.rating}</span>`
    : '';

  const myRating = state.myRatings[key];
  const myRatingDisplay = myRating
    ? `<span class="my-rating-display">☆ ${myRating}</span>`
    : '';

  const genreHtml = info?.genres?.length
    ? info.genres.slice(0,3).map(g => `<span class="genre-tag">${g}</span>`).join('')

  // OTT 링크 매핑 (provider_id → 검색/직접 URL)
  const OTT_LINKS = {
    8:    t => `https://www.netflix.com/search?q=${encodeURIComponent(t)}`,
    356:  t => `https://www.wavve.com/search?keyword=${encodeURIComponent(t)}`,
    97:   t => `https://www.watcha.com/search?query=${encodeURIComponent(t)}`,
    1899: t => `https://www.tving.com/search?keyword=${encodeURIComponent(t)}`,
    337:  t => `https://www.disneyplus.com/search/${encodeURIComponent(t)}`,
    350:  t => `https://tv.apple.com/search?term=${encodeURIComponent(t)}`,
    119:  t => `https://www.primevideo.com/search?phrase=${encodeURIComponent(t)}`,
    521:  t => `https://www.coupangplay.com/search?keyword=${encodeURIComponent(t)}`,
    626:  t => `https://www.watcha.com/search?query=${encodeURIComponent(t)}`,

  const ottItems = info?.ottList?.length ? info.ottList : [];

    ? ottItems.map(p => {

        const url = getUrl(cleanTitle);

  // 게스트명 (추천자가 게스트인 경우만)

    ? `<span class="guest-name">${guestName}</span>` : '';

  const googleUrl = `https://www.google.com/search?q=${encodeURIComponent(cleanTitle + (releaseYear ? ` (${releaseYear})` : '') + ' 영화')}`;

  // 커뮤니티 pill (하단 좌측) — 😈 악마 아이콘 + 평균 + 시청자수
  const cs = (window._communityStats || {})[key];
  const commPillHtml = (cs && cs.count >= 1)
    ? `<div class="comm-pill">😈 ${cs.avg.toFixed(1)}<span class="pill-cnt">· 👁 ${cs.count}</span></div>` : '';

  const ribbonSvg = `<svg class="ribbon-icon" viewBox="0 0 18 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 2 H16 V22 L9 16 L2 22 Z"/></svg>`;

  return `
<div class="movie-card ${isBookmarked ? 'bookmarked' : ''}" data-key="${key.replace(/"/g,'&quot;')}" onclick="if(window.innerWidth>640)window.open('${googleUrl}','_blank')" style="cursor:pointer">
  <div class="poster-wrap">
    ${posterSrc ? `<img class="poster-img" src="${posterSrc}" alt="${cleanTitle}" loading="lazy" onerror="this.style.display='none'">` : `<div class="poster-placeholder"><div class="ph-icon">🎬</div><div class="ph-title">${cleanTitle}</div></div>`}
    ${commPillHtml}
    <div class="card-overlay">
      <div class="watched-btn ${myRating ? 'rated' : ''}" onclick="event.stopPropagation();toggleStarPanel(event,'${key.replace(/'/g,"\\'")}',this)" title="내가 본 영화">

    <div class="card-title"><span>${cleanTitle}${releaseYear ? ` (${releaseYear})` : ''}${m.subtitle ? `<span class="card-subtitle"> ${m.subtitle}</span>` : ''}</span></div>
    <div class="card-genres">${genreHtml}</div>
    <div class="platform-row">${platformHtml}</div>

</div>`;
}

async function loadMovieInfo(m) {
  const key = getMovieKey(m);
  // 이미 로딩 중이면 중복 실행 차단
  if (state.loadingSet.has(key)) return;
  state.loadingSet.add(key);

  try {
    const { cleanTitle, releaseYear } = parseTitle(m.title);
    // tmdbSkip: true 필드가 있으면 TMDB 검색 건너뜀
    if (m.tmdbSkip) {
      state.movieCache[key] = {};
      return;
    }
    const info = await fetchTMDB(cleanTitle, releaseYear);
    state.movieCache[key] = info || {};

    // 카드 업데이트: data-key 속성으로 정확히 해당 카드만 찾아 교체
    const grid = document.getElementById('movieGrid');
    const card = grid?.querySelector(`.movie-card[data-key="${key.replace(/"/g,'&quot;')}"]`);
    // 반드시 현재 그리드 안에 붙어있는 카드만 교체 (renderGrid 재호출로 이미 사라진 경우 무시)
    if (card && grid && grid.contains(card)) {
      const tmp = document.createElement('div');
      tmp.innerHTML = renderCard(m);
      const newCard = tmp.firstElementChild;
      card.replaceWith(newCard);
      requestAnimationFrame(() => {
        const titleEl = newCard.querySelector('.card-title');
        if (titleEl) {
          if (titleEl.scrollWidth > titleEl.clientWidth) {
            titleEl.classList.add('is-truncated');
            const overflow = titleEl.scrollWidth - titleEl.clientWidth;
            titleEl.style.setProperty('--marquee-dist', `-${overflow}px`);
          } else {
            titleEl.classList.remove('is-truncated');
          }
        }
      });
    }
  } finally {
    state.loadingSet.delete(key);
  }
}

// 별점 패널 HTML 생성 (star-wrap 구조, 표준 5각별)
function buildStarPanel(key, currentRating) {
  const SP = 'M14 2.5L17.09 9.26L24.5 10.27L19.25 15.36L20.55 22.74L14 19.27L7.45 22.74L8.75 15.36L3.5 10.27L10.91 9.26Z';
  const uid = key.replace(/[^a-zA-Z0-9]/g, '_');
  let html = '';
  for (let i = 1; i <= 5; i++) {
    const fullVal = i, halfVal = i - 0.5;
    let fillType = 'empty';
    if (currentRating >= fullVal) fillType = 'full';
    else if (currentRating >= halfVal) fillType = 'half';

    const clipId = `hc_${uid}_${i}`;
    const svgFull = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg">
      <path d="${SP}" fill="#f5c518" stroke="#f5c518" stroke-width="0.5" stroke-linejoin="round"/>
    </svg>`;
    const svgHalf = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg">
      <defs><clipPath id="${clipId}"><rect x="0" y="0" width="14" height="26"/></clipPath></defs>
      <path d="${SP}" fill="#3a3a3a" stroke="#555" stroke-width="0.5" stroke-linejoin="round"/>
      <path d="${SP}" fill="#f5c518" stroke="#f5c518" stroke-width="0.5" stroke-linejoin="round" clip-path="url(#${clipId})"/>
    </svg>`;
    const svgEmpty = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg">
      <path d="${SP}" fill="#3a3a3a" stroke="#555" stroke-width="0.5" stroke-linejoin="round"/>
    </svg>`;

    const svgHtml = fillType === 'full' ? svgFull : fillType === 'half' ? svgHalf : svgEmpty;
    const ek = key.replace(/'/g, "\\'");
    html += `<div class="star-wrap" data-star="${i}" data-key="${key.replace(/"/g,'&quot;')}">
      ${svgHtml}
      <div class="star-half-l"
        onmouseenter="previewStars('${ek}',${halfVal})"
        onmouseleave="resetStarPreview('${ek}',${currentRating||0})"
        onclick="event.stopPropagation();setMyRating('${ek}',${halfVal})"></div>
      <div class="star-half-r"
        onmouseenter="previewStars('${ek}',${fullVal})"
        onmouseleave="resetStarPreview('${ek}',${currentRating||0})"
        onclick="event.stopPropagation();setMyRating('${ek}',${fullVal})"></div>
    </div>`;
  }
  return html;
}

function toggleStarPanel(e, key, btn) {
  e.stopPropagation();
  if (state.myRatings[key]) {
    delete state.myRatings[key];
    localStorage.setItem('cinemaMyRatings', JSON.stringify(state.myRatings));
    window._syncToCloud?.();           // 클라우드에도 취소 반영
    window._updateMovieStat?.(key, null); // 커뮤니티 집계에서 해당 유저 점수 제거
    renderGrid();
    return;
  }
  const panelId = `sp_${key.replace(/[^a-zA-Z0-9]/g,'_')}`;
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.star-panel.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) {
    const cur = state.myRatings[key] || 0;
    panel.innerHTML = buildStarPanel(key, cur);
    panel.classList.add('open');
    attachStarPanelTouch(panel, key);
  }
}

// 터치 드래그 별점 입력 (모바일용)
function attachStarPanelTouch(panel, key) {
  let pendingVal = null;

  function getValFromTouch(touch) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return null;
    const half = el.closest('.star-half-l, .star-half-r');
    if (!half) return null;
    const wrap = half.closest('.star-wrap');
    if (!wrap) return null;
    const star = parseInt(wrap.dataset.star);
    return half.classList.contains('star-half-l') ? star - 0.5 : star;
  }

  panel.addEventListener('touchstart', e => {
    e.stopPropagation();
    const val = getValFromTouch(e.touches[0]);
    if (val !== null) { pendingVal = val; previewStars(key, val); }
  }, { passive: true });

  panel.addEventListener('touchmove', e => {
    e.stopPropagation();
    e.preventDefault();
    const val = getValFromTouch(e.touches[0]);
    if (val !== null) { pendingVal = val; previewStars(key, val); }
  }, { passive: false });

  panel.addEventListener('touchend', e => {
    e.stopPropagation();
    if (pendingVal !== null) setMyRating(key, pendingVal);
    pendingVal = null;
  });
}

function previewStars(key, val) {
  const panelId = `sp_${key.replace(/[^a-zA-Z0-9]/g,'_')}`;
  const panel = document.getElementById(panelId);
  if (!panel) return;
  const SP = 'M14 2.5L17.09 9.26L24.5 10.27L19.25 15.36L20.55 22.74L14 19.27L7.45 22.74L8.75 15.36L3.5 10.27L10.91 9.26Z';
  const uid = key.replace(/[^a-zA-Z0-9]/g,'_');
  panel.querySelectorAll('.star-wrap').forEach(wrap => {
    const i = parseInt(wrap.dataset.star);
    const clipId = `hc_${uid}_${i}_p`;
    let svg;
    if (val >= i)        svg = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg"><path d="${SP}" fill="#f5c518" stroke="#f5c518" stroke-width="0.5" stroke-linejoin="round"/></svg>`;
    else if (val >= i-0.5) svg = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg"><defs><clipPath id="${clipId}"><rect x="0" y="0" width="14" height="26"/></clipPath></defs><path d="${SP}" fill="#3a3a3a" stroke="#555" stroke-width="0.5" stroke-linejoin="round"/><path d="${SP}" fill="#f5c518" stroke="#f5c518" stroke-width="0.5" stroke-linejoin="round" clip-path="url(#${clipId})"/></svg>`;
    else                  svg = `<svg viewBox="0 0 28 26" xmlns="http://www.w3.org/2000/svg"><path d="${SP}" fill="#3a3a3a" stroke="#555" stroke-width="0.5" stroke-linejoin="round"/></svg>`;
    wrap.querySelector('svg').outerHTML = svg;
    const tmp = document.createElement('div');
    tmp.innerHTML = svg;
    wrap.querySelector('svg').replaceWith(tmp.firstElementChild);
  });
}

function resetStarPreview(key, cur) {
  previewStars(key, cur || 0);

let pickerPhase = 'ready';
let drumAnimId = null;

function openPickerModal() {
  pickerPhase = 'ready';
  document.getElementById('pickerPhaseReady').style.display = '';
  document.getElementById('pickerPhaseAnim').style.display  = 'none';
  document.getElementById('pickerPhaseResult').style.display = 'none';

function closePickerModal() {
  document.getElementById('pickerOverlay').classList.remove('open');
  if (drumAnimId) { cancelAnimationFrame(drumAnimId); drumAnimId = null; }
  pickerPhase = 'ready';
}

function startPicker() {
  const pool = filterMovies();
  if (pool.length === 0) {
    alert('현재 필터 조건에 해당하는 영화가 없습니다.');
    return;
  }
  pickerPhase = 'anim';
  document.getElementById('pickerPhaseReady').style.display = 'none';
  document.getElementById('pickerPhaseAnim').style.display  = '';

  playDrumSound();

  const canvas = document.getElementById('drumCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const ticker = document.getElementById('pickerTickerTitle');
  const titles = pool.map(m => parseTitle(m.title).cleanTitle);

  let angle = 0;
  const duration = 2600;
  const start = performance.now();

  const SLIP_COLORS = ['#c9a84c','#e8c96e','#b8922a','#d4af37','#f0d060','#e85555','#c0392b'];
  const N = Math.min(titles.length, 16);
  // 쪽지들: 바깥 링(r=68) 을 따라 배치
  const slips = Array.from({length: N}, (_, i) => ({
    angle: (i / N) * Math.PI * 2,
    r: 68,
    color: SLIP_COLORS[i % SLIP_COLORS.length],
  }));

  // 파티클
  const particles = Array.from({length: 18}, (_, i) => ({
    angle: Math.random() * Math.PI * 2,
    r: 30 + Math.random() * 40,
    size: 2 + Math.random() * 3,
    speed: (0.6 + Math.random() * 0.8) * (Math.random() < 0.5 ? 1 : -1),
    color: SLIP_COLORS[i % SLIP_COLORS.length],
    opacity: 0.5 + Math.random() * 0.5,
  }));

  function drawDrum(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);

    // 감속 커브: 초반 빠르게, 후반 부드럽게 정지
    const ease = Math.pow(1 - progress, 2.2);
    const speed = ease * 0.22 + 0.002;
    angle += speed;

    ctx.clearRect(0, 0, W, H);
    const cx = W / 2, cy = H / 2;
    const R = 88;

    // ── 외부 황금 링 (고정) ──
    const outerRing = ctx.createRadialGradient(cx, cy, R - 4, cx, cy, R + 10);
    outerRing.addColorStop(0,   '#8B6914');
    outerRing.addColorStop(0.3, '#D4AF37');
    outerRing.addColorStop(0.6, '#F5E06E');
    outerRing.addColorStop(0.8, '#C9941C');
    outerRing.addColorStop(1,   '#7A5C0A');
    ctx.beginPath();
    ctx.arc(cx, cy, R + 10, 0, Math.PI * 2);
    ctx.fillStyle = outerRing;
    ctx.shadowColor = 'rgba(212,175,55,0.6)';
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    // 금장 눈금 (고정)
    for (let i = 0; i < 32; i++) {
      const a = (i / 32) * Math.PI * 2;
      const long = i % 4 === 0;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * (R + 2), cy + Math.sin(a) * (R + 2));
      ctx.lineTo(cx + Math.cos(a) * (R + (long ? 9 : 5)), cy + Math.sin(a) * (R + (long ? 9 : 5)));
      ctx.strokeStyle = long ? 'rgba(255,240,120,0.9)' : 'rgba(255,220,80,0.4)';
      ctx.lineWidth = long ? 1.5 : 0.8;
      ctx.stroke();
    }

    // ── 통 본체 ──
    const bodyGrad = ctx.createRadialGradient(cx - 20, cy - 20, 10, cx, cy, R);
    bodyGrad.addColorStop(0,   '#1a3a2a');
    bodyGrad.addColorStop(0.5, '#0f2a1e');
    bodyGrad.addColorStop(1,   '#071510');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // ── 회전하는 섹터 (룰렛 칸) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R - 3, 0, Math.PI * 2);
    ctx.clip();

    const sectorN = 16;
    for (let i = 0; i < sectorN; i++) {
      const a1 = angle + (i / sectorN) * Math.PI * 2;
      const a2 = angle + ((i + 1) / sectorN) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, R - 3, a1, a2);
      ctx.closePath();
      ctx.fillStyle = i % 2 === 0
        ? 'rgba(180,20,20,0.55)'
        : 'rgba(8,8,8,0.65)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(212,175,55,0.25)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
    ctx.restore();

    // ── 중간 링 (반대 방향 회전) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R - 3, 0, Math.PI * 2);
    ctx.clip();

    const innerR = 52;
    // 반대 방향 회전 링
    const ringAngle = -angle * 1.4;
    for (let i = 0; i < 12; i++) {
      const a = ringAngle + (i / 12) * Math.PI * 2;
      const x1 = cx + Math.cos(a) * (innerR - 8);
      const y1 = cy + Math.sin(a) * (innerR - 8);
      const x2 = cx + Math.cos(a) * (innerR + 8);
      const y2 = cy + Math.sin(a) * (innerR + 8);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.strokeStyle = 'rgba(212,175,55,0.5)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
    ctx.restore();

    // ── 쪽지들 (링 위 회전) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, R - 3, 0, Math.PI * 2);
    ctx.clip();

    slips.forEach((s, i) => {
      const a = s.angle + angle;
      const x = cx + Math.cos(a) * s.r;
      const y = cy + Math.sin(a) * s.r;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);

      const sw = 26, sh = 14;
      const slipGrad = ctx.createLinearGradient(-sw/2, -sh/2, sw/2, sh/2);
      slipGrad.addColorStop(0, '#f5e06e');
      slipGrad.addColorStop(0.5, s.color);
      slipGrad.addColorStop(1, '#8B6914');
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 6;
      ctx.fillStyle = slipGrad;
      ctx.beginPath();
      ctx.roundRect(-sw/2, -sh/2, sw, sh, 3);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(139,105,20,0.9)';
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // 쪽지 줄
      ctx.strokeStyle = 'rgba(80,50,0,0.4)';
      ctx.lineWidth = 0.6;
      [-3, 3].forEach(dy => {
        ctx.beginPath();
        ctx.moveTo(-sw/2+3, dy); ctx.lineTo(sw/2-3, dy);
        ctx.stroke();
      });
      ctx.restore();
    });
    ctx.restore();

    // ── 파티클 (안쪽 튀김) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, innerR - 6, 0, Math.PI * 2);
    ctx.clip();
    particles.forEach(p => {
      p.angle += p.speed * speed * 2.5;
      const x = cx + Math.cos(p.angle) * p.r;
      const y = cy + Math.sin(p.angle) * p.r;
      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.opacity * ease + 0.1;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
    ctx.restore();

    // ── 중앙 칩 (반대 방향 회전) ──
    const chipAngle = -angle * 0.8;
    const centerGrad = ctx.createRadialGradient(cx - 4, cy - 4, 2, cx, cy, 24);
    centerGrad.addColorStop(0,   '#f5e06e');
    centerGrad.addColorStop(0.4, '#D4AF37');
    centerGrad.addColorStop(0.7, '#8B6914');
    centerGrad.addColorStop(1,   '#5c4409');
    ctx.beginPath();
    ctx.arc(cx, cy, 24, 0, Math.PI * 2);
    ctx.shadowColor = 'rgba(212,175,55,0.9)';
    ctx.shadowBlur = 14;
    ctx.fillStyle = centerGrad;
    ctx.fill();
    ctx.shadowBlur = 0;

    // 칩 살대
    ctx.strokeStyle = 'rgba(255,240,150,0.7)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2 + chipAngle;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 7, cy + Math.sin(a) * 7);
      ctx.lineTo(cx + Math.cos(a) * 20, cy + Math.sin(a) * 20);
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a0a';
    ctx.fill();
    ctx.strokeStyle = '#D4AF37';
    ctx.lineWidth = 1;
    ctx.stroke();

    // ── 포인터 (상단 삼각형) ──
    ctx.save();
    ctx.shadowColor = 'rgba(255,220,50,0.9)';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#F5E06E';
    ctx.beginPath();
    ctx.moveTo(cx - 9, cy - R - 12);
    ctx.lineTo(cx + 9, cy - R - 12);
    ctx.lineTo(cx,     cy - R + 4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // ── 하이라이트 ──
    const hlGrad = ctx.createRadialGradient(cx - 30, cy - 30, 0, cx - 15, cy - 15, 60);
    hlGrad.addColorStop(0,   'rgba(255,255,255,0.13)');
    hlGrad.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = hlGrad;
    ctx.fill();

    // 티커
    const tickInterval = 55 + progress * 160;
    const tickerIdx = Math.floor(elapsed / tickInterval) % titles.length;
    ticker.textContent = titles[tickerIdx] || '';

    if (progress < 1) {
      drumAnimId = requestAnimationFrame(drawDrum);
    } else {
      cancelAnimationFrame(drumAnimId);
      const picked = pool[Math.floor(Math.random() * pool.length)];
      setTimeout(() => showPickerResult(picked), 350);
    }
  }
  drumAnimId = requestAnimationFrame(drawDrum);
}

function playDrumSound() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ac = new AudioCtx();
    const totalDur = 2.2;

    function clack(time, freq, vol) {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(vol, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
      osc.start(time); osc.stop(time + 0.08);
    }

    // 점점 느려지는 달그락 리듬
    let t = 0, interval = 0.07;
    while (t < totalDur) {
      clack(ac.currentTime + t, 800 + Math.random()*400, 0.18);
      t += interval;
      interval *= 1.045; // 점점 느려짐
    }
    // 마지막 큰 소리
    clack(ac.currentTime + totalDur + 0.05, 1200, 0.3);
  } catch(e) {}
}

function showPickerResult(m) {
  pickerPhase = 'result';
  document.getElementById('pickerPhaseAnim').style.display   = 'none';
  document.getElementById('pickerPhaseResult').style.display = '';

  const { cleanTitle, releaseYear } = parseTitle(m.title);
  const info = state.movieCache[getMovieKey(m)];
  const posterSrc = m.posterOverride || info?.poster;

  const posterEl = document.getElementById('pickerResultPoster');
  posterEl.className = 'picker-unroll';
  // 애니메이션 재실행용 reflow
  void posterEl.offsetWidth;
  posterEl.className = 'picker-unroll';

  if (posterSrc) {
    posterEl.innerHTML = `<img src="${posterSrc}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    posterEl.innerHTML = `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1e1e,#2a2a2a);color:#555;gap:8px">

      <div style="font-size:12px;color:#888;padding:0 12px;text-align:center;line-height:1.3">${cleanTitle}</div>
    </div>`;
  }

  document.getElementById('pickerResultTitle').textContent =
    cleanTitle + (releaseYear ? ` (${releaseYear})` : '');
  document.getElementById('pickerResultMeta').textContent =
    `${m.recommender} 추천 · ${m.year}.${m.date}`;
}

  btn.classList.toggle('active', !isOpen);
}

function updateFilterBadge() {
  const f = state.filters;
  const count = [f.recommender, f.year, f.genre, f.platform].filter(v => v !== '전체').length
    + (state.excludeWatched ? 1 : 0)
    + (state.showWatchedOnly ? 1 : 0);
  const badge = document.getElementById('filterActiveCount');
  if (!badge) return;
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

  state.filters[type] = val;
  document.querySelectorAll(`.filter-btn`).forEach(btn => {

      btn.classList.remove('active');

}

function updateModalBookmark(key, btn) {

  btn.style.background = isNow ? 'var(--gold)' : 'var(--surface2)';
  btn.style.color = isNow ? '#000' : 'var(--text)';
  btn.textContent = isNow ? '★ 책갈피 해제' : '☆ 책갈피 추가';
}

function closeModal(e) {
  if (e.target.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('editOverlay').classList.remove('open');
  }
});

// ============================================================
// DB 편집 기능
// ============================================================
let editTargetKey = null;

function openEditModal(key) {
  const m = RAW_DATA.find(x => getMovieKey(x) === key);
  if (!m) return;
  editTargetKey = key;
  document.getElementById('editTitle').value = m.title;
  document.getElementById('editRecommender').value = m.recommender;
  document.getElementById('editYear').value = m.year;
  document.getElementById('editDate').value = m.date;
  document.getElementById('editMsg').textContent = '';
  document.getElementById('editOverlay').classList.add('open');
}

function saveEdit() {
  if (!editTargetKey) return;
  const idx = RAW_DATA.findIndex(x => getMovieKey(x) === editTargetKey);
  if (idx === -1) return;
  const newTitle = document.getElementById('editTitle').value.trim();
  const newRec   = document.getElementById('editRecommender').value;
  const newYear  = document.getElementById('editYear').value.trim();
  const newDate  = document.getElementById('editDate').value.trim();
  if (!newTitle || !newYear || !newDate) {
    document.getElementById('editMsg').textContent = '⚠️ 모든 항목을 입력해주세요.';
    return;
  }
  // 캐시 삭제 (제목 변경 시 TMDB 재검색)
  delete state.movieCache[editTargetKey];
  delete tmdbCache[`${RAW_DATA[idx].title.replace(/\s*\(\d{4}\)$/,'').trim()}__${RAW_DATA[idx].title.match(/\((\d{4})\)$/)?.[1]||null}`];
  RAW_DATA[idx] = { date: newDate, year: newYear, recommender: newRec, title: newTitle };
  // 로컬스토리지에 수정 내용 저장
  saveEditsToStorage();
  document.getElementById('editMsg').textContent = '✅ 저장됐습니다.';
  setTimeout(() => {
    document.getElementById('editOverlay').classList.remove('open');
    renderGrid();
  }, 700);
}

function deleteEntry() {
  if (!editTargetKey) return;
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  const idx = RAW_DATA.findIndex(x => getMovieKey(x) === editTargetKey);
  if (idx !== -1) {
    RAW_DATA.splice(idx, 1);
    saveEditsToStorage();
  }
  document.getElementById('editOverlay').classList.remove('open');
  renderGrid();
}

function saveEditsToStorage() {
  // 수정된 RAW_DATA를 localStorage에 저장 (다음 방문 시에도 유지)
  try {
    localStorage.setItem('cinemaEdits', JSON.stringify(RAW_DATA));
  } catch(e) {}
}

// 저장된 편집 내용 불러오기
(function loadEdits() {
  try {
    const saved = localStorage.getItem('cinemaEdits');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.length > 0) {
        RAW_DATA.length = 0;
        parsed.forEach(m => RAW_DATA.push(m));
      }
    }
  } catch(e) {}
})();

// ============================================================
// 초기화
// ============================================================
document.getElementById('bookmarkCount').textContent = state.bookmarks.size;
renderGrid();

// ============================================================
// Firebase 연동
// ============================================================
window._communityStats = {}; // { movieKey: { avg, count } }

// ── Firebase 연동 헬퍼 (compat API)
// ============================================================

window._communityStats = {};

window._loadCommunityStats = async function() {
  if (!window._db) return;
  try {
    const snap = await window._db.collection('movieStats').get();
    const stats = {};
    snap.forEach(d => { stats[d.id] = d.data(); });
    window._communityStats = stats;
    console.log('[FB] communityStats loaded', Object.keys(stats).length);
  } catch(e) { console.warn('[FB] communityStats load failed', e); }
};

window._syncFromCloud = async function(uid) {
  if (!window._db) return;
  try {
    const snap = await window._db.collection('users').doc(uid).get();
    if (!snap.exists) return;
    const data = snap.data();
    if (data.bookmarks) {
      state.bookmarks = new Set(data.bookmarks);
      localStorage.setItem('cinemaBookmarks', JSON.stringify([...state.bookmarks]));
      const el = document.getElementById('bookmarkCount');
      if (el) el.textContent = state.bookmarks.size;
    }
    if (data.myRatings) {
      state.myRatings = data.myRatings;
      localStorage.setItem('cinemaMyRatings', JSON.stringify(state.myRatings));
    }
    console.log('[FB] syncFromCloud ok');
  } catch(e) { console.warn('[FB] syncFromCloud failed', e); }
};

window._syncToCloud = async function() {
  if (!window._fbUser || !window._db) return;
  try {
    // merge:true 를 쓰면 삭제된 키가 Firestore에 남아 복원됨
    // → myRatings는 항상 현재 상태 전체로 덮어씀
    const ref = window._db.collection('users').doc(window._fbUser.uid);
    const snap = await ref.get();
    const existing = snap.exists ? snap.data() : {};
    await ref.set({
      ...existing,
      bookmarks: [...state.bookmarks],
      myRatings: state.myRatings,   // 전체 교체 (삭제된 키 반영)
      updatedAt: Date.now()
    });
    console.log('[FB] syncToCloud ok, ratings:', Object.keys(state.myRatings).length);
  } catch(e) { console.warn('[FB] syncToCloud failed', e); }
};

window._updateMovieStat = async function(key, newVal) {
  if (!window._db || !window._fbUser) return;
  const uid = window._fbUser.uid;
  try {
    const userRatingRef = window._db
      .collection('movieStats').doc(key)
      .collection('ratings').doc(uid);

    if (newVal === null || newVal === undefined) {
      await userRatingRef.delete();
      console.log('[FB] rating deleted', key, uid);
    } else {
      await userRatingRef.set({ score: newVal, updatedAt: Date.now() });
      console.log('[FB] rating set', key, uid, newVal);
    }

    // 전체 유저 평점 재집계
    const allSnap = await window._db
      .collection('movieStats').doc(key)
      .collection('ratings').get();

    let totalScore = 0, count = 0;
    allSnap.forEach(d => { totalScore += d.data().score || 0; count++; });
    const avg = count > 0 ? Math.round((totalScore / count) * 10) / 10 : 0;

    await window._db.collection('movieStats').doc(key).set(
      { totalScore, count, avg }, { merge: true }
    );
    // 집계 완료 후 해당 카드의 커뮤니티 pill만 직접 교체 (renderGrid 재호출 없이)
    window._communityStats[key] = avg > 0 ? { avg, count } : null;
    console.log('[FB] movieStat recalculated', key, '→ avg:', avg, 'count:', count);

    const card = document.querySelector(`.movie-card[data-key="${key.replace(/"/g,'&quot;')}"]`);
    if (card) {
      const oldPill = card.querySelector('.comm-pill');
      if (avg > 0) {
        const newPill = document.createElement('div');
        newPill.className = 'comm-pill';
        newPill.innerHTML = `😈 ${avg.toFixed(1)}<span class="pill-cnt">· 👁 ${count}</span>`;
        if (oldPill) oldPill.replaceWith(newPill);
        else card.querySelector('.poster-wrap')?.appendChild(newPill);
      } else {
        oldPill?.remove();
      }
    }
  } catch(e) { console.warn('[FB] updateMovieStat failed', e); }
};
